<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cidade Presente - Novo Paciente</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                    "on-secondary-container": "#3f5881",
                    "inverse-surface": "#2d3037",
                    "surface-tint": "#005db8",
                    "secondary": "#465f88",
                    "on-primary-fixed-variant": "#00458d",
                    "surface-container-lowest": "#ffffff",

                    "on-secondary-fixed": "#001b3d",

            "spacing": {

                    "sm": "8px"

            "fontFamily": {

<style>
        .material-symbols-outlined {
          font-variation-settings:
          'FILL' 0,
          'wght' 400,
          'GRAD' 0,
          'opsz' 24
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex flex-col font-body-md text-body-md text-on-background">
<!-- TopAppBar -->
<header class="docked full-width top-0 bg-surface shadow-sm z-40 sticky">
<div class="flex justify-between items-center w-full px-margin h-16">
<button class="text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Novo Paciente</h1>
<div class="w-10"></div> <!-- Placeholder for balance -->
</div>
</header>
<!-- Main Content -->
<main class="flex-1 w-full max-w-2xl mx-auto p-md md:p-margin pb-24">
<!-- Form Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-sm p-lg">
<form class="flex flex-col gap-lg">
<!-- Nome Completo -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="nome">Nome Completo</label>
<input class="bg-surface-bright border border-outline-variant rounded-lg px-md py-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface" id="nome" name="nome" placeholder="Ex: Maria da Silva" type="text"/>
</div>
<!-- Row for CPF and Cartão SUS -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- CPF -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="cpf">CPF</label>
<input class="bg-surface-bright border border-outline-variant rounded-lg px-md py-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface" id="cpf" name="cpf" placeholder="000.000.000-00" type="text"/>
</div>
<!-- Cartão SUS -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="sus">Cartão SUS</label>
<input class="bg-surface-bright border border-outline-variant rounded-lg px-md py-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface" id="sus" name="sus" placeholder="000 0000 0000 0000" type="text"/>
</div>
</div>
<!-- Row for Data de Nascimento and Sexo -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-md">
<!-- Data de Nascimento -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="nascimento">Data de Nascimento</label>
<input class="bg-surface-bright border border-outline-variant rounded-lg px-md py-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface" id="nascimento" name="nascimento" type="date"/>
</div>
<!-- Sexo -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="sexo">Sexo</label>
<select class="bg-surface-bright border border-outline-variant rounded-lg px-md py-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface appearance-none" id="sexo" name="sexo">
<option value="">Selecione...</option>
<option value="m">Masculino</option>
<option value="f">Feminino</option>
<option value="o">Outro</option>
<option value="n">Não Informar</option>
</select>
</div>
</div>
<!-- Telefone -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="telefone">Telefone para Contato</label>
<input class="bg-surface-bright border border-outline-variant rounded-lg px-md py-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface" id="telefone" name="telefone" placeholder="(00) 00000-0000" type="tel"/>
</div>
<!-- Endereço -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant" for="endereco">Endereço Completo</label>
<textarea class="bg-surface-bright border border-outline-variant rounded-lg px-md py-sm focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-colors font-body-md text-body-md text-on-surface resize-none" id="endereco" name="endereco" placeholder="Rua, Número, Complemento, Bairro, Cidade - UF" rows="3"></textarea>
</div>
<!-- Actions -->
<div class="flex flex-col sm:flex-row-reverse gap-md mt-lg">
<button class="w-full sm:w-auto bg-primary text-on-primary font-body-lg text-body-lg font-medium px-xl py-sm rounded-lg hover:bg-primary-container hover:text-on-primary-container transition-colors shadow-sm" type="submit">
                        Salvar Cadastro
                    </button>
<button class="w-full sm:w-auto bg-transparent border border-outline text-primary font-body-lg text-body-lg font-medium px-xl py-sm rounded-lg hover:bg-surface-container-high transition-colors" type="button">
                        Cancelar
                    </button>
</div>
</form>
</div>
</main>
</body></html>
